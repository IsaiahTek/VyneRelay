name: vynelix_relay_flutter
description: Flutter client for VynRelay. Resilient real-time messaging with WebSocket/SSE fallback.
version: 1.0.1
homepage: "https://github.com/IsaiahTek/VyneRelay/tree/main/sdk/flutter"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ">=2.4.0 <4.0.0"
  http: ">=1.1.0 <2.0.0"
  uuid: ">=4.0.0 <5.0.0"
  nanoid: ">=1.0.0 <2.0.0"
  collection: ">=1.17.0 <2.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0

flutter:
  uses-material-design: true
